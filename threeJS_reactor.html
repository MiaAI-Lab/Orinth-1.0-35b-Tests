<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Futuristic Energy Reactor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #000;
      font-family: 'Courier New', monospace;
      color: #0ff;
    }

    canvas {
      display: block;
    }

    /* UI Overlay */
    #ui-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      pointer-events: none;
      z-index: 100;
      padding: 20px;
    }

    #scene-title {
      font-size: 28px;
      font-weight: bold;
      text-shadow: 0 0 10px #0ff, 0 0 20px #0ff, 0 0 40px #00f;
      letter-spacing: 4px;
      margin-bottom: 10px;
      animation: titlePulse 3s ease-in-out infinite;
    }

    @keyframes titlePulse {
      0%, 100% { opacity: 0.9; }
      50% { opacity: 1; text-shadow: 0 0 15px #0ff, 0 0 30px #0ff, 0 0 60px #00f, 0 0 80px #08f; }
    }

    #instructions {
      font-size: 13px;
      opacity: 0.7;
      line-height: 1.8;
      max-width: 380px;
    }

    #instructions span {
      color: #ff0;
    }

    #status-panel {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0, 20, 40, 0.7);
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 8px;
      padding: 16px 20px;
      font-size: 13px;
      min-width: 220px;
      backdrop-filter: blur(5px);
    }

    #status-panel h3 {
      font-size: 14px;
      margin-bottom: 10px;
      color: #0ff;
      border-bottom: 1px solid rgba(0, 255, 255, 0.2);
      padding-bottom: 6px;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      margin: 6px 0;
      gap: 16px;
    }

    .status-label {
      opacity: 0.6;
    }

    .status-value {
      font-weight: bold;
      color: #0f0;
    }

    #power-bar-container {
      width: 100%;
      height: 6px;
      background: rgba(0, 255, 255, 0.1);
      border-radius: 3px;
      margin-top: 10px;
      overflow: hidden;
    }

    #power-bar {
      height: 100%;
      width: 72%;
      background: linear-gradient(90deg, #0ff, #0f0);
      border-radius: 3px;
      transition: width 0.3s ease, background 0.3s ease;
    }

    #click-hint {
      position: fixed;
      bottom: 20px;
      left: 20px;
      font-size: 12px;
      opacity: 0.4;
      animation: fadeInOut 4s ease-in-out infinite;
    }

    @keyframes fadeInOut {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.6; }
    }
  </style>
</head>
<body>
  <!-- UI Overlay -->
  <div id="ui-overlay">
    <div id="scene-title">⚡ PLASMA REACTOR CORE ⚡</div>
    <div id="instructions">
      <span>Left Drag</span> — Rotate view<br>
      <span>Right Drag</span> — Pan view<br>
      <span>Scroll</span> — Zoom in/out<br>
      <span>Click Core</span> — Trigger overload<br>
      <span>Move Mouse</span> — Influence field
    </div>
  </div>

  <!-- Status Panel -->
  <div id="status-panel">
    <h3>⚙ REACTOR STATUS</h3>
    <div class="status-row">
      <span class="status-label">Power Level:</span>
      <span class="status-value" id="power-level">72%</span>
    </div>
    <div class="status-row">
      <span class="status-label">Core Temp:</span>
      <span class="status-value" id="core-temp">3,847 K</span>
    </div>
    <div class="status-row">
      <span class="status-label">Rings Active:</span>
      <span class="status-value" id="rings-active">6</span>
    </div>
    <div class="status-row">
      <span class="status-label">FPS:</span>
      <span class="status-value" id="fps-counter">60</span>
    </div>
    <div id="power-bar-container">
      <div id="power-bar"></div>
    </div>
  </div>

  <div id="click-hint">Click the reactor core to trigger an energy pulse</div>

  <!-- Three.js Scene -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ═══════════════════════════════════════════════════════════
    // SCENE SETUP
    // ═══════════════════════════════════════════════════════════
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000510, 0.012);

    const camera = new THREE.PerspectiveCamera(
      60, window.innerWidth / window.innerHeight, 0.1, 1000
    );
    camera.position.set(0, 8, 18);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: false,
      powerPreference: 'high-performance'
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    // Orbit Controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 5;
    controls.maxDistance = 50;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.3;

    // ═══════════════════════════════════════════════════════════
    // BACKGROUND — Starfield
    // ═══════════════════════════════════════════════════════════
    const starCount = 2000;
    const starPositions = new Float32Array(starCount * 3);
    const starSizes = new Float32Array(starCount);
    for (let i = 0; i < starCount; i++) {
      const i3 = i * 3;
      const radius = 80 + Math.random() * 200;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      starPositions[i3] = radius * Math.sin(phi) * Math.cos(theta);
      starPositions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
      starPositions[i3 + 2] = radius * Math.cos(phi);
      starSizes[i] = Math.random() * 2 + 0.5;
    }
    const starGeometry = new THREE.BufferGeometry();
    starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    starGeometry.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));
    const starMaterial = new THREE.PointsMaterial({
      color: 0xffffff,
      size: 0.4,
      sizeAttenuation: true,
      transparent: true,
      opacity: 0.8
    });
    const stars = new THREE.Points(starGeometry, starMaterial);
    scene.add(stars);

    // ═══════════════════════════════════════════════════════════
    // GRID FLOOR
    // ═══════════════════════════════════════════════════════════
    const gridHelper = new THREE.GridHelper(60, 60, 0x003355, 0x001122);
    gridHelper.position.y = -5;
    scene.add(gridHelper);

    // Reflective floor plane
    const floorGeometry = new THREE.PlaneGeometry(60, 60);
    const floorMaterial = new THREE.MeshStandardMaterial({
      color: 0x000815,
      metalness: 0.9,
      roughness: 0.4,
      transparent: true,
      opacity: 0.6
    });
    const floor = new THREE.Mesh(floorGeometry, floorMaterial);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -5;
    scene.add(floor);

    // ═══════════════════════════════════════════════════════════
    // CENTRAL REACTOR CORE — Icosahedron with custom shader
    // ═══════════════════════════════════════════════════════════
    const coreGroup = new THREE.Group();
    scene.add(coreGroup);

    // Inner core — glowing icosahedron
    const coreGeometry = new THREE.IcosahedronGeometry(1.8, 2);
    const coreMaterial = new THREE.MeshStandardMaterial({
      color: 0x00ffff,
      emissive: 0x0066ff,
      emissiveIntensity: 2,
      metalness: 0.3,
      roughness: 0.1,
      transparent: true,
      opacity: 0.85,
      wireframe: false
    });
    const coreMesh = new THREE.Mesh(coreGeometry, coreMaterial);
    coreGroup.add(coreMesh);

    // Wireframe overlay
    const wireframeMaterial = new THREE.MeshBasicMaterial({
      color: 0x00ffff,
      wireframe: true,
      transparent: true,
      opacity: 0.3
    });
    const wireframeMesh = new THREE.Mesh(
      new THREE.IcosahedronGeometry(1.85, 2),
      wireframeMaterial
    );
    coreGroup.add(wireframeMesh);

    // Outer glow sphere
    const glowGeometry = new THREE.SphereGeometry(2.5, 32, 32);
    const glowMaterial = new THREE.MeshBasicMaterial({
      color: 0x0044ff,
      transparent: true,
      opacity: 0.08,
      side: THREE.BackSide
    });
    const glowSphere = new THREE.Mesh(glowGeometry, glowMaterial);
    coreGroup.add(glowSphere);

    // ═══════════════════════════════════════════════════════════
    // ORBITING ENERGY RINGS — Torus geometries
    // ═══════════════════════════════════════════════════════════
    const ringConfigs = [
      { radius: 3.2, tube: 0.04, color: 0x00ffff, speed: 0.4, tilt: 0 },
      { radius: 3.8, tube: 0.03, color: 0x0088ff, speed: -0.3, tilt: Math.PI / 3 },
      { radius: 4.5, tube: 0.035, color: 0xff00ff, speed: 0.25, tilt: -Math.PI / 4 },
      { radius: 5.0, tube: 0.025, color: 0x00ff88, speed: -0.2, tilt: Math.PI / 6 },
      { radius: 3.5, tube: 0.03, color: 0xffff00, speed: 0.35, tilt: Math.PI / 2 },
      { radius: 4.2, tube: 0.02, color: 0xff4400, speed: -0.15, tilt: -Math.PI / 5 }
    ];

    const rings = [];
    const sharedRingMaterial = new THREE.MeshStandardMaterial({
      color: 0xffffff,
      emissive: 0x0044ff,
      emissiveIntensity: 1.5,
      metalness: 0.8,
      roughness: 0.2,
      transparent: true,
      opacity: 0.7
    });

    ringConfigs.forEach((config, index) => {
      const ringGroup = new THREE.Group();
      const ringGeometry = new THREE.TorusGeometry(config.radius, config.tube, 16, 100);
      const ring = new THREE.Mesh(ringGeometry, sharedRingMaterial.clone());
      ring.material.color.setHex(config.color);
      ring.material.emissive.setHex(config.color);

      // Orbit the ring
      const orbitGroup = new THREE.Group();
      orbitGroup.add(ring);
      ringGroup.add(orbitGroup);

      // Tilt the orbit plane
      orbitGroup.rotation.x = config.tilt;
      orbitGroup.rotation.z = index * 0.3;

      coreGroup.add(ringGroup);
      rings.push({
        group: ringGroup,
        orbitGroup: orbitGroup,
        ring: ring,
        speed: config.speed,
        baseColor: new THREE.Color(config.color),
        index: index
      });
    });

    // ═══════════════════════════════════════════════════════════
    // ORBITING GEOMETRIC OBJECTS (3+ types)
    // ═══════════════════════════════════════════════════════════
    const orbitObjects = [];

    // Octahedrons
    for (let i = 0; i < 6; i++) {
      const geo = new THREE.OctahedronGeometry(0.3, 0);
      const mat = new THREE.MeshStandardMaterial({
        color: 0x00ffff,
        emissive: 0x004488,
        emissiveIntensity: 1,
        metalness: 0.9,
        roughness: 0.1,
        transparent: true,
        opacity: 0.9
      });
      const mesh = new THREE.Mesh(geo, mat);
      scene.add(mesh);
      orbitObjects.push({
        mesh,
        orbitRadius: 6 + Math.random() * 4,
        orbitSpeed: 0.15 + Math.random() * 0.1,
        orbitOffset: (i / 6) * Math.PI * 2,
        orbitY: (Math.random() - 0.5) * 4,
        bobSpeed: 1 + Math.random(),
        bobAmount: 0.3 + Math.random() * 0.5,
        rotSpeed: new THREE.Vector3(
          Math.random() * 2 - 1,
          Math.random() * 2 - 1,
          Math.random() * 2 - 1
        )
      });
    }

    // Dodecahedrons
    for (let i = 0; i < 4; i++) {
      const geo = new THREE.DodecahedronGeometry(0.4, 0);
      const mat = new THREE.MeshStandardMaterial({
        color: 0xff44ff,
        emissive: 0x660066,
        emissiveIntensity: 1.2,
        metalness: 0.8,
        roughness: 0.2,
        transparent: true,
        opacity: 0.85
      });
      const mesh = new THREE.Mesh(geo, mat);
      scene.add(mesh);
      orbitObjects.push({
        mesh,
        orbitRadius: 8 + Math.random() * 3,
        orbitSpeed: -0.1 + Math.random() * 0.08,
        orbitOffset: (i / 4) * Math.PI * 2 + 1,
        orbitY: (Math.random() - 0.5) * 6,
        bobSpeed: 0.8 + Math.random(),
        bobAmount: 0.4 + Math.random() * 0.4,
        rotSpeed: new THREE.Vector3(
          Math.random() * 1.5 - 0.75,
          Math.random() * 1.5 - 0.75,
          Math.random() * 1.5 - 0.75
        )
      });
    }

    // Tetrahedrons
    for (let i = 0; i < 5; i++) {
      const geo = new THREE.TetrahedronGeometry(0.35, 0);
      const mat = new THREE.MeshStandardMaterial({
        color: 0xffaa00,
        emissive: 0x884400,
        emissiveIntensity: 1,
        metalness: 0.7,
        roughness: 0.3,
        transparent: true,
        opacity: 0.8
      });
      const mesh = new THREE.Mesh(geo, mat);
      scene.add(mesh);
      orbitObjects.push({
        mesh,
        orbitRadius: 7 + Math.random() * 5,
        orbitSpeed: 0.12 + Math.random() * 0.06,
        orbitOffset: (i / 5) * Math.PI * 2 + 0.5,
        orbitY: (Math.random() - 0.5) * 5,
        bobSpeed: 1.2 + Math.random(),
        bobAmount: 0.2 + Math.random() * 0.3,
        rotSpeed: new THREE.Vector3(
          Math.random() * 2 - 1,
          Math.random() * 2 - 1,
          Math.random() * 2 - 1
        )
      });
    }

    // ═══════════════════════════════════════════════════════════
    // PARTICLE SYSTEM — Energy particles
    // ═══════════════════════════════════════════════════════════
    const particleCount = 1500;
    const particleGeometry = new THREE.BufferGeometry();
    const particlePositions = new Float32Array(particleCount * 3);
    const particleVelocities = new Float32Array(particleCount * 3);
    const particleColors = new Float32Array(particleCount * 3);
    const particleSizes = new Float32Array(particleCount);

    for (let i = 0; i < particleCount; i++) {
      const i3 = i * 3;
      const angle = Math.random() * Math.PI * 2;
      const radius = 1.5 + Math.random() * 8;
      const height = (Math.random() - 0.5) * 8;

      particlePositions[i3] = Math.cos(angle) * radius;
      particlePositions[i3 + 1] = height;
      particlePositions[i3 + 2] = Math.sin(angle) * radius;

      particleVelocities[i3] = (Math.random() - 0.5) * 0.01;
      particleVelocities[i3 + 1] = (Math.random() - 0.5) * 0.01;
      particleVelocities[i3 + 2] = (Math.random() - 0.5) * 0.01;

      const colorChoice = Math.random();
      if (colorChoice < 0.33) {
        particleColors[i3] = 0; particleColors[i3 + 1] = 1; particleColors[i3 + 2] = 1;
      } else if (colorChoice < 0.66) {
        particleColors[i3] = 0; particleColors[i3 + 1] = 0.5; particleColors[i3 + 2] = 1;
      } else {
        particleColors[i3] = 1; particleColors[i3 + 1] = 0.3; particleColors[i3 + 2] = 0.8;
      }

      particleSizes[i] = Math.random() * 3 + 0.5;
    }

    particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
    particleGeometry.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
    particleGeometry.setAttribute('size', new THREE.BufferAttribute(particleSizes, 1));

    const particleMaterial = new THREE.PointsMaterial({
      size: 0.08,
      vertexColors: true,
      transparent: true,
      opacity: 0.7,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      sizeAttenuation: true
    });

    const particleSystem = new THREE.Points(particleGeometry, particleMaterial);
    scene.add(particleSystem);

    // ═══════════════════════════════════════════════════════════
    // LIGHTING
    // ═══════════════════════════════════════════════════════════

    // Ambient light — subtle base
    const ambientLight = new THREE.AmbientLight(0x112244, 0.5);
    scene.add(ambientLight);

    // Core point light — follows core
    const coreLight = new THREE.PointLight(0x00aaff, 5, 30, 2);
    coreGroup.add(coreLight);

    // Moving colored light 1
    const movingLight1 = new THREE.PointLight(0xff0066, 3, 25, 2);
    scene.add(movingLight1);

    // Moving colored light 2
    const movingLight2 = new THREE.PointLight(0x00ff88, 3, 25, 2);
    scene.add(movingLight2);

    // Moving colored light 3
    const movingLight3 = new THREE.PointLight(0x8844ff, 2, 20, 2);
    scene.add(movingLight3);

    // Directional light for depth
    const dirLight = new THREE.DirectionalLight(0x4466aa, 0.5);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    // ═══════════════════════════════════════════════════════════
    // MOUSE INTERACTION
    // ═══════════════════════════════════════════════════════════
    const mouse = new THREE.Vector2(0, 0);
    const mouse3D = new THREE.Vector3(0, 0, 0);
    const raycaster = new THREE.Raycaster();

    window.addEventListener('mousemove', (event) => {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    });

    // Click on reactor core
    window.addEventListener('click', (event) => {
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(coreMesh);
      if (intersects.length > 0) {
        triggerOverload();
      }
    });

    // ═══════════════════════════════════════════════════════════
    // OVERLOAD ANIMATION STATE
    // ═══════════════════════════════════════════════════════════
    let overloadActive = false;
    let overloadTime = 0;
    let overloadDuration = 2.0;
    let basePower = 72;
    let currentPower = 72;

    function triggerOverload() {
      overloadActive = true;
      overloadTime = 0;
      currentPower = Math.min(100, basePower + 30);
      // Burst particles
      burstParticles();
    }

    function burstParticles() {
      const positions = particleSystem.geometry.attributes.position.array;
      for (let i = 0; i < particleCount; i++) {
        const i3 = i * 3;
        const angle = Math.random() * Math.PI * 2;
        const radius = 1 + Math.random() * 2;
        positions[i3] = Math.cos(angle) * radius;
        positions[i3 + 1] = (Math.random() - 0.5) * 2;
        positions[i3 + 2] = Math.sin(angle) * radius;
        particleVelocities[i3] = (Math.random() - 0.5) * 0.15;
        particleVelocities[i3 + 1] = (Math.random() - 0.5) * 0.15;
        particleVelocities[i3 + 2] = (Math.random() - 0.5) * 0.15;
      }
      particleSystem.geometry.attributes.position.needsUpdate = true;
    }

    // ═══════════════════════════════════════════════════════════
    // ANIMATION LOOP
    // ═══════════════════════════════════════════════════════════
    const clock = new THREE.Clock();
    let frameCount = 0;
    let fpsTime = 0;
    let fps = 60;

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      const elapsed = clock.getElapsedTime();

      // FPS counter
      frameCount++;
      fpsTime += delta;
      if (fpsTime >= 0.5) {
        fps = Math.round(frameCount / fpsTime);
        fpsTime = 0;
        frameCount = 0;
      }

      // ─── Core Animation ───
      const corePulse = 1 + Math.sin(elapsed * 2) * 0.05;
      coreMesh.scale.set(corePulse, corePulse, corePulse);
      wireframeMesh.scale.set(corePulse * 1.02, corePulse * 1.02, corePulse * 1.02);

      coreMesh.rotation.x = elapsed * 0.3;
      coreMesh.rotation.y = elapsed * 0.5;

      wireframeMesh.rotation.x = elapsed * 0.35;
      wireframeMesh.rotation.y = elapsed * 0.45;
      wireframeMesh.rotation.z = elapsed * 0.2;

      glowSphere.scale.set(corePulse * 1.1, corePulse * 1.1, corePulse * 1.1);

      // Core material color oscillation
      const hueShift = Math.sin(elapsed * 1.5) * 0.05;
      coreMaterial.emissive.setHSL(0.55 + hueShift, 1, 0.4);
      coreMaterial.emissiveIntensity = 1.5 + Math.sin(elapsed * 3) * 0.5;

      // ─── Overload Animation ───
      if (overloadActive) {
        overloadTime += delta;
        const t = overloadTime / overloadDuration;

        if (t < 1) {
          // Intensify core
          const intensity = Math.sin(t * Math.PI) * 3;
          coreMaterial.emissiveIntensity = 2 + intensity;
          coreMaterial.color.setHSL(
            0.5 + t * 0.1, 1, 0.3 + intensity * 0.1
          );
          glowMaterial.opacity = 0.08 + intensity * 0.03;

          // Shake core
          coreGroup.position.x = Math.sin(elapsed * 80) * 0.05 * (1 - t);
          coreGroup.position.z = Math.cos(elapsed * 70) * 0.05 * (1 - t);

          // Pulse rings faster
          rings.forEach((ring, i) => {
            ring.ring.rotation.z += delta * ring.speed * (2 + intensity);
          });
        } else {
          overloadActive = false;
          currentPower = basePower;
          coreGroup.position.x = 0;
          coreGroup.position.z = 0;
        }
      }

      // ─── Ring Animation ───
      rings.forEach((ring, i) => {
        ring.ring.rotation.z += delta * ring.speed;
        ring.ring.rotation.x += delta * ring.speed * 0.3;

        // Subtle breathing
        const breathe = 1 + Math.sin(elapsed * 1.5 + i) * 0.02;
        ring.ring.scale.set(breathe, breathe, breathe);

        // Color shift
        ring.ring.material.emissiveIntensity =
          1.2 + Math.sin(elapsed * 2 + i * 0.8) * 0.4;
      });

      // ─── Orbiting Objects ───
      orbitObjects.forEach((obj) => {
        const angle = elapsed * obj.orbitSpeed + obj.orbitOffset;
        obj.mesh.position.x = Math.cos(angle) * obj.orbitRadius;
        obj.mesh.position.z = Math.sin(angle) * obj.orbitRadius;
        obj.mesh.position.y =
          obj.orbitY + Math.sin(elapsed * obj.bobSpeed + obj.orbitOffset) * obj.bobAmount;

        // Self-rotation
        obj.mesh.rotation.x += delta * obj.rotSpeed.x;
        obj.mesh.rotation.y += delta * obj.rotSpeed.y;
        obj.mesh.rotation.z += delta * obj.rotSpeed.z;
      });

      // ─── Particle Animation ───
      const positions = particleSystem.geometry.attributes.position.array;
      for (let i = 0; i < particleCount; i++) {
        const i3 = i * 3;

        // Spiral inward then reset
        particleVelocities[i3] += (0 - positions[i3]) * 0.0002;
        particleVelocities[i3 + 1] += (0 - positions[i3 + 1]) * 0.0002;
        particleVelocities[i3 + 2] += (0 - positions[i3 + 2]) * 0.0002;

        positions[i3] += particleVelocities[i3] + Math.sin(elapsed + i * 0.1) * 0.003;
        positions[i3 + 1] += particleVelocities[i3 + 1] + Math.cos(elapsed * 0.7 + i * 0.05) * 0.002;
        positions[i3 + 2] += particleVelocities[i3 + 2] + Math.sin(elapsed * 0.5 + i * 0.08) * 0.003;

        // Reset particles that get too close to center or too far
        const dist = Math.sqrt(
          positions[i3] ** 2 +
          positions[i3 + 1] ** 2 +
          positions[i3 + 2] ** 2
        );

        if (dist < 0.5 || dist > 12) {
          const angle = Math.random() * Math.PI * 2;
          const radius = 3 + Math.random() * 6;
          positions[i3] = Math.cos(angle) * radius;
          positions[i3 + 1] = (Math.random() - 0.5) * 6;
          positions[i3 + 2] = Math.sin(angle) * radius;
          particleVelocities[i3] = (Math.random() - 0.5) * 0.01;
          particleVelocities[i3 + 1] = (Math.random() - 0.5) * 0.01;
          particleVelocities[i3 + 2] = (Math.random() - 0.5) * 0.01;
        }
      }
      particleSystem.geometry.attributes.position.needsUpdate = true;
      particleSystem.rotation.y = elapsed * 0.02;

      // ─── Mouse Influence ───
      const mouseInfluence = 0.3;
      coreGroup.rotation.x += (mouse.y * mouseInfluence - coreGroup.rotation.x) * 0.02;
      coreGroup.rotation.z += (-mouse.x * mouseInfluence - coreGroup.rotation.z) * 0.02;

      // Particles subtly attracted to mouse
      for (let i = 0; i < particleCount; i++) {
        const i3 = i * 3;
        particleVelocities[i3] += mouse.x * 0.00005;
        particleVelocities[i3 + 1] += mouse.y * 0.00005;
      }

      // ─── Dynamic Lights ───
      // Light 1 orbits horizontally
      movingLight1.position.x = Math.cos(elapsed * 0.8) * 10;
      movingLight1.position.y = Math.sin(elapsed * 0.5) * 5 + 2;
      movingLight1.position.z = Math.sin(elapsed * 0.8) * 10;

      // Light 2 orbits vertically
      movingLight2.position.x = Math.sin(elapsed * 0.6) * 8;
      movingLight2.position.y = Math.cos(elapsed * 0.4) * 6 + 3;
      movingLight2.position.z = Math.cos(elapsed * 0.6) * 8;

      // Light 3 spirals
      movingLight3.position.x = Math.cos(elapsed * 0.3) * 12;
      movingLight3.position.y = Math.sin(elapsed * 0.7) * 4;
      movingLight3.position.z = Math.sin(elapsed * 0.3) * 12;

      // Core light pulses
      coreLight.intensity = 4 + Math.sin(elapsed * 3) * 1.5;
      coreLight.color.setHSL(0.55 + Math.sin(elapsed) * 0.05, 1, 0.5);

      // ─── Background Stars slow rotation ───
      stars.rotation.y = elapsed * 0.005;
      stars.rotation.x = elapsed * 0.002;

      // ─── Power Level Decay ───
      if (currentPower > basePower) {
        currentPower -= delta * 5;
        if (currentPower < basePower) currentPower = basePower;
      }

      // ─── Update UI ───
      updateUI(elapsed);

      // ─── Render ───
      controls.update();
      renderer.render(scene, camera);
    }

    // ═══════════════════════════════════════════════════════════
    // UI UPDATE
    // ═══════════════════════════════════════════════════════════
    const powerLevelEl = document.getElementById('power-level');
    const coreTempEl = document.getElementById('core-temp');
    const ringsEl = document.getElementById('rings-active');
    const fpsEl = document.getElementById('fps-counter');
    const powerBar = document.getElementById('power-bar');

    function updateUI(elapsed) {
      // Power level
      const power = Math.round(currentPower);
      powerLevelEl.textContent = power + '%';
      powerLevelEl.style.color = power > 90 ? '#f44' : power > 75 ? '#ff0' : '#0f0';

      // Core temperature (simulated)
      const temp = Math.round(3500 + Math.sin(elapsed * 2) * 400 + (currentPower - 72) * 30);
      coreTempEl.textContent = temp.toLocaleString() + ' K';

      // Power bar
      powerBar.style.width = power + '%';
      if (power > 90) {
        powerBar.style.background = 'linear-gradient(90deg, #f44, #ff0)';
      } else if (power > 75) {
        powerBar.style.background = 'linear-gradient(90deg, #ff0, #0f0)';
      } else {
        powerBar.style.background = 'linear-gradient(90deg, #0ff, #0f0)';
      }

      // FPS
      fpsEl.textContent = fps;
      fpsEl.style.color = fps >= 50 ? '#0f0' : fps >= 30 ? '#ff0' : '#f44';

      // Rings
      ringsEl.textContent = overloadActive ? '6 ★ PULSING' : '6';
    }

    // ═══════════════════════════════════════════════════════════
    // RESPONSIVE RESIZING
    // ═══════════════════════════════════════════════════════════
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });

    // ═══════════════════════════════════════════════════════════
    // START
    // ═══════════════════════════════════════════════════════════
    animate();
  </script>
</body>
</html>
